# Исключаем папки, которые не нужно проверять
excluded:
  - Pods
  - DerivedData

disabled_rules:
  - trailing_whitespace              
  - implicit_optional_initialization  # for CloudKit
  - identifier_name                  

# SwiftData
function_parameter_count:
  warning: 12
  error: 20

line_length:
  warning: 160
  error: 200
