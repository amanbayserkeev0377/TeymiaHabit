included:
  - TeymiaHabit
excluded:
  - Pods
  - DerivedData
  - ./*/Packages

disabled_rules:
  - trailing_whitespace
  - implicit_optional_initialization # CloudKit (@Optional)
  - identifier_name
  - multiple_closures_with_trailing_closure

type_name:
  min_length: 2
  excluded:
    - DS

function_parameter_count:
  warning: 12
  error: 20

line_length:
  warning: 160
  error: 200

opening_brace:
  severity: warning
  allow_multiline_declarations: true

empty_count:
  severity: warning

statement_position:
  severity: warning
