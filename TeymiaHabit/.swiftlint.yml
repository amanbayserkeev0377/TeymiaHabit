opt_in_rules:
  - empty_count
  - force_unwrapping
  - force_cast
  - vertical_whitespace
  - first_where
  - contains_over_filter_is_empty
  - discouraged_optional_boolean
  - closure_spacing
  - prefer_self_in_static_references

included:
  - TeymiaHabit
excluded:
  - Pods
  - DerivedData
  - ./*/Packages

disabled_rules:
  - trailing_whitespace
  - identifier_name
  - multiple_closures_with_trailing_closure
  - implicit_optional_initialization

type_name:
  min_length: 2
  excluded:
    - DS

function_parameter_count:
  warning: 12
  error: 20

line_length:
  warning: 160
  error: 200

function_body_length:
  warning: 60
  error: 100

nesting:
  type_level: 3
  statement_level: 5

opening_brace:
  severity: warning

empty_count:
  severity: warning

statement_position:
  severity: warning
